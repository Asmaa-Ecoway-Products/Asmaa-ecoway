<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Cairo (same family) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (premium feel) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#2d5a27',
                            light: '#e8f3e8',
                            gold: '#d4af37',
                            accent: '#4c8c4a'
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(2deg)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #f5fff0 0%, #f0f7ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated nature-inspired background elements */
        .leaf-bg-1, .leaf-bg-2, .leaf-bg-3 {
            position: absolute;
            opacity: 0.1;
            color: #2d5a27;
            z-index: 0;
            pointer-events: none;
        }
        .leaf-bg-1 {
            top: 5%;
            right: 2%;
            font-size: 8rem;
            transform: rotate(15deg);
            animation: float 14s ease-in-out infinite;
        }
        .leaf-bg-2 {
            bottom: 8%;
            left: 3%;
            font-size: 12rem;
            transform: rotate(-20deg);
            animation: float 18s ease-in-out infinite reverse;
        }
        .leaf-bg-3 {
            top: 40%;
            left: 10%;
            font-size: 6rem;
            transform: rotate(45deg);
            animation: float 12s ease-in-out infinite 1s;
        }

        /* main card shine effect */
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: shine 8s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(30deg); }
            20% { transform: translateX(100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        /* floating shapes */
        .shape {
            position: absolute;
            background: rgba(212, 175, 55, 0.03);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
        }
        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -50px;
            background: #d4af37;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -80px;
            background: #4c8c4a;
            opacity: 0.08;
        }

        /* scrollbar hide (beauty) */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* responsive icon adjustments */
        @media (max-width: 640px) {
            .leaf-bg-1 { font-size: 5rem; }
            .leaf-bg-2 { font-size: 7rem; }
        }
    </style>
</head>
<body>

    <!-- abstract decorative background (silent luxury) -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <i class="ph-fill ph-leaf leaf-bg-1"></i>
    <i class="ph-fill ph-plant leaf-bg-2"></i>
    <i class="ph-fill ph-seedling leaf-bg-3"></i>

    <!-- MAIN CARD - كل التركيز هنا، لا كلمات زائدة -->
    <div class="relative z-10 w-full max-w-2xl mx-auto">
        <div class="bg-white/90 backdrop-blur-xl rounded-[3rem] shadow-2xl border border-white/30 p-6 sm:p-10 md:p-14 shine-effect transition-all duration-700 hover:shadow-[0_30px_60px_-15px_rgba(45,90,39,0.4)] group">
            
            <!-- العلامة المائية الخفيفة جدا (فقط للإحساس) -->
            <div class="absolute top-4 left-4 opacity-5 text-6xl rotate-12 group-hover:opacity-10 transition-opacity">
                <i class="ph-fill ph-hand-heart"></i>
            </div>

            <!-- المحتوى الأساسي: أنيق، واضح، خالٍ من الحشو -->
            <div class="text-center relative">
                
                <!-- أيقونة النجاح الرئيسية (متحركة) -->
                <div class="inline-flex mb-6 sm:mb-8 relative">
                    <div class="absolute inset-0 bg-brand-light rounded-full animate-ping opacity-20"></div>
                    <div class="relative bg-gradient-to-b from-brand-dark to-brand-accent text-white rounded-full p-5 sm:p-7 shadow-xl">
                        <i class="ph-fill ph-check-circle text-5xl sm:text-7xl"></i>
                    </div>
                </div>

                <!-- النص المرحب (أنيق جدا، بدون إطالة) -->
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-brand-dark mb-3 leading-tight">
                    شكراً<br class="sm:hidden"> لانضمامك!
                </h1>
                
                <div class="w-20 h-1 bg-brand-gold mx-auto rounded-full my-5 sm:my-6"></div>
                
                <!-- الرسالة الجوهرية: مختصرة وواثقة -->
                <p class="text-gray-600 text-lg sm:text-xl md:text-2xl max-w-lg mx-auto leading-relaxed">
                    استلمنا طلبك<br class="sm:hidden"> وسنتواصل معك قريباً عبر الواتساب.
                </p>

                <!-- تفاصيل دقيقة ولكنها مفيدة (بدون كلام فارغ) -->
                <div class="mt-8 sm:mt-10 flex flex-wrap items-center justify-center gap-3 text-sm sm:text-base text-gray-500">
                    <span class="bg-brand-light/60 px-4 py-2 rounded-full flex items-center gap-2">
                        <i class="ph-fill ph-clock text-brand-accent"></i> 24 ساعة
                    </span>
                    <span class="bg-brand-light/60 px-4 py-2 rounded-full flex items-center gap-2">
                        <i class="ph-fill ph-whatsapp-logo text-brand-accent"></i> مراجعة سريعة
                    </span>
                </div>

                <!-- زر العودة إلى الرئيسية (أنيق ومريح) -->
                <div class="mt-10 sm:mt-14">
                    <a href="index.html" 
                       class="group/btn inline-flex items-center gap-3 bg-brand-dark text-white text-lg sm:text-xl font-bold px-8 sm:px-10 py-4 sm:py-5 rounded-full shadow-xl hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 hover:bg-brand-accent border border-white/20">
                        <i class="ph-bold ph-arrow-right text-xl sm:text-2xl transition-transform group-hover/btn:-translate-x-1"></i>
                        <span>العودة للصفحة الرئيسية</span>
                        <i class="ph-fill ph-house-simple text-xl sm:text-2xl"></i>
                    </a>
                </div>

                <!-- رابط خفيف للتواصل المباشر (اختياري راقي) -->
                <div class="mt-6 text-xs sm:text-sm text-gray-400 flex items-center justify-center gap-2">
                    <span>استفسار عاجل؟</span>
                    <a href="https://wa.me/201012345678" class="text-brand-dark hover:text-brand-accent underline underline-offset-2 font-semibold transition-colors inline-flex items-center gap-1">
                        <i class="ph-fill ph-whatsapp-logo"></i> واتساب
                    </a>
                </div>
            </div>
        </div>

        <!-- شعار أسفل البطاقة (فقط Clean Home. Safe Life كتوقيع) -->
        <div class="text-center mt-8 text-brand-dark/70 font-bold text-2xl sm:text-3xl flex items-center justify-center gap-3 opacity-80">
            <i class="ph-fill ph-leaf text-brand-accent animate-pulse-slow"></i>
            <span>Clean Home.</span>
            <span class="text-brand-gold">Safe Life</span>
        </div>
    </div>

    <!-- micro interaction: لو حابين نضيف تأثير عند التحميل -->
    <script>
        (function() {
            // رسالة وحيدة في الكونسول تهنئ
            console.log('✨ شكراً لانضمامك لفريق أسماء محمد - نورتينا ✨');
        })();
    </script>
    <!-- Meta Pixel Code -->
</body>
</html>
