<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - Asmaa Ecoway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="data/products.js"></script>
    <script src="js/products-loader.js"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fbfbfb; }
        .product-image { transition: transform 0.3s ease; }
        .thumbnail { cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .thumbnail.active { border-color: #2d5a27; }
    </style>
</head>
<body>
    
    <!-- هيدر بسيط -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3">
            <a href="index.html" class="text-2xl font-bold text-green-800 flex items-center gap-2">
                <i class="ph-fill ph-leaf"></i> Asmaa Ecoway Products
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6" id="product-detail">
        <!-- يملأ ديناميكياً -->
        <div class="text-center py-20">
            <div class="animate-spin inline-block w-12 h-12 border-4 border-green-200 border-t-green-700 rounded-full"></div>
            <p class="mt-4 text-gray-500">جاري تحميل المنتج...</p>
        </div>
    </main>

    <script>
        // تحميل المنتج من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        
        function loadProductDetail() {
            const product = PRODUCTS_DATA.products.find(p => p.id === productId);
            
            if (!product) {
                document.getElementById('product-detail').innerHTML = `
                    <div class="text-center py-20">
                        <i class="ph ph-package text-6xl text-gray-300"></i>
                        <h2 class="text-2xl font-bold text-gray-500 mt-4">المنتج غير موجود</h2>
                        <a href="index.html" class="text-green-700 mt-4 inline-block">العودة للرئيسية</a>
                    </div>
                `;
                return;
            }

            // تحديث عنوان الصفحة
            document.title = `${product.name} - Asmaa Ecoway`;

            // بناء HTML المنتج
            let imagesHtml = '';
            product.images.forEach((img, i) => {
                imagesHtml += `
                    <div class="thumbnail w-20 h-20 rounded-lg overflow-hidden ${i === 0 ? 'active' : ''}" 
                         onclick="changeMainImage(this, '${img}')">
                        <img src="${img}" alt="${product.name}" class="w-full h-full object-cover">
                    </div>
                `;
            });

            const featuresHtml = (product.features || []).map(f => 
                `<span class="bg-green-50 text-green-800 px-3 py-1 rounded-full text-sm flex items-center gap-1">
                    <i class="ph-fill ph-check-circle"></i> ${f}
                </span>`
            ).join('');

            document.getElementById('product-detail').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 bg-white rounded-3xl p-6 shadow-sm">
                    <!-- الصور -->
                    <div>
                        <div class="aspect-square rounded-2xl overflow-hidden bg-gray-100" id="main-image-container">
                            <img src="${product.images[0]}" alt="${product.name}" 
                                 class="w-full h-full object-cover" id="main-image">
                        </div>
                        <div class="flex gap-2 mt-3 overflow-x-auto pb-2">
                            ${imagesHtml}
                        </div>
                    </div>
                    
                    <!-- التفاصيل -->
                    <div>
                        <nav class="text-sm text-gray-500 mb-3">
                            <a href="index.html">الرئيسية</a> / ${product.name}
                        </nav>
                        <h1 class="text-3xl font-bold text-gray-800 mb-3">${product.name}</h1>
                        
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-yellow-500">${'⭐'.repeat(Math.floor(product.rating))}</span>
                            <span class="text-gray-500 text-sm">(${product.reviews} تقييم)</span>
                        </div>
                        
                        <div class="text-3xl font-bold text-green-700 mb-4">
                            ${product.price} جنيه
                            ${product.originalPrice ? `<span class="line-through text-gray-400 text-lg mr-2">${product.originalPrice} جنيه</span>` : ''}
                        </div>
                        
                        ${product.description ? `
                            <div class="bg-green-50 p-4 rounded-xl mb-4">
                                <p class="text-gray-700">${product.description}</p>
                            </div>
                        ` : ''}
                        
                        ${featuresHtml ? `
                            <div class="flex flex-wrap gap-2 mb-6">
                                ${featuresHtml}
                            </div>
                        ` : ''}
                        
                        <button onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})" 
                                class="w-full bg-green-700 text-white py-4 rounded-xl font-bold hover:bg-green-600 transition shadow-lg flex items-center justify-center gap-2 text-lg">
                            <i class="ph-bold ph-shopping-cart"></i> أضف للسلة
                        </button>
                    </div>
                </div>
            `;
        }

        function changeMainImage(thumbnail, imgSrc) {
            document.getElementById('main-image').src = imgSrc;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            thumbnail.classList.add('active');
        }

        // تحميل عند فتح الصفحة
        if (productId) {
            loadProductDetail();
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
